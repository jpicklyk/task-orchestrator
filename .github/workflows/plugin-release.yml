name: Plugin Release

on:
  push:
    tags:
      - 'plugin-v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract plugin version from tag
      id: version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#plugin-v}"
        echo "version=${TAG_VERSION}" >> $GITHUB_OUTPUT
        echo "Plugin release version: ${TAG_VERSION}"

    - name: Verify tag matches plugin.json
      run: |
        PLUGIN_VERSION=$(jq -r '.version' claude-plugins/task-orchestrator/.claude-plugin/plugin.json)
        TAG_VERSION="${GITHUB_REF_NAME#plugin-v}"
        if [ "$PLUGIN_VERSION" != "$TAG_VERSION" ]; then
          echo "ERROR: Tag ${GITHUB_REF_NAME} does not match plugin.json version (${PLUGIN_VERSION})"
          exit 1
        fi

    - name: Verify marketplace.json matches
      run: |
        MARKETPLACE_VERSION=$(jq -r '.plugins[] | select(.name=="task-orchestrator") | .version' .claude-plugin/marketplace.json)
        TAG_VERSION="${GITHUB_REF_NAME#plugin-v}"
        if [ "$MARKETPLACE_VERSION" != "$TAG_VERSION" ]; then
          echo "ERROR: marketplace.json version (${MARKETPLACE_VERSION}) does not match tag ${GITHUB_REF_NAME}"
          exit 1
        fi

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ github.ref_name }}" \
          --title "Plugin ${{ github.ref_name }}" \
          --generate-notes \
          --verify-tag
