openapi: "3.1.0"
info:
  title: MCP Task Orchestrator REST API
  version: "1.0"
  description: |
    HTTP REST API for the MCP Task Orchestrator. Operates alongside the MCP transport when
    API_ENABLED=true. Base URL: /api/v1

    NOTE: This file is hand-maintained and may lag edge-case behavior. The source code and
    api-rest.md are authoritative. See api-rest.md for full semantics including merge-patch
    rules, ETag formats, idempotency, audit model, and the SSE replay known limitation.

servers:
  - url: /api/v1
    description: REST API base

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Static bearer token (API_AUTH_MODE=bearer) or JWT (API_AUTH_MODE=jwks).
        For SSE, use Authorization header or opt-in ?token= query param.
        Optional opt-in unauthenticated mode (API_AUTH_MODE=none + API_ALLOW_UNAUTHENTICATED=true)
        accepts requests with no Authorization header at all — loopback-only, see api-rest.md §1.

  parameters:
    itemId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    noteKey:
      name: key
      in: path
      required: true
      schema:
        type: string
    depId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20

  schemas:
    ItemDto:
      type: object
      required: [id, title, summary, role, priority, requiresVerification, tags, properties,
                 createdAt, modifiedAt, roleChangedAt, etag, depth, isClaimed]
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        summary:
          type: string
        type:
          type: string
          nullable: true
        role:
          type: string
          enum: [queue, work, review, terminal, blocked]
        previousRole:
          type: string
          enum: [queue, work, review]
          nullable: true
        statusLabel:
          type: string
          nullable: true
        priority:
          type: string
          enum: [high, medium, low]
        complexity:
          type: integer
          nullable: true
        requiresVerification:
          type: boolean
        tags:
          type: array
          items:
            type: string
        properties:
          type: object
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        roleChangedAt:
          type: string
          format: date-time
        etag:
          type: string
          description: '"v1-<modifiedAtMillis>" — use as If-Match on PATCH'
        depth:
          type: integer
        isClaimed:
          type: boolean
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteDto"
          nullable: true
          description: Populated when ?include=notes
        children:
          type: array
          items:
            $ref: "#/components/schemas/ItemDto"
          nullable: true
          description: Populated when ?include=children
        dependencies:
          $ref: "#/components/schemas/DependenciesDto"

    NoteDto:
      type: object
      required: [key, role, body, createdAt, modifiedAt, etag]
      properties:
        key:
          type: string
        role:
          type: string
          enum: [queue, work, review]
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        modifiedAt:
          type: string
          format: date-time
        etag:
          type: string
          description: '"v1-<modifiedAtMillis>" — use as If-Match on PUT'
        actor:
          $ref: "#/components/schemas/ActorClaimDto"
        verification:
          $ref: "#/components/schemas/VerificationDto"

    ActorClaimDto:
      type: object
      nullable: true
      required: [id, kind]
      properties:
        id:
          type: string
          description: "Server-synthesized: api:<tokenId>"
        kind:
          type: string
          enum: [orchestrator, subagent, user, external]
          description: Always "external" for REST API writes
        parent:
          type: string
          nullable: true
        proof:
          type: string
          nullable: true
          description: Redacted unless ADMIN + ?include=proof

    VerificationDto:
      type: object
      nullable: true
      required: [status]
      properties:
        status:
          type: string
          enum: [absent, unchecked, verified, rejected, unavailable]
        verifier:
          type: string
          nullable: true
        reason:
          type: string
          nullable: true

    RoleTransitionDto:
      type: object
      required: [id, itemId, toRole, trigger, occurredAt]
      properties:
        id:
          type: string
          format: uuid
        itemId:
          type: string
          format: uuid
        fromRole:
          type: string
          nullable: true
        toRole:
          type: string
        trigger:
          type: string
        statusLabel:
          type: string
          nullable: true
        occurredAt:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/ActorClaimDto"
        verification:
          $ref: "#/components/schemas/VerificationDto"

    DependenciesDto:
      type: object
      required: [blocks, blockedBy, related]
      properties:
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdgeDto"
        blockedBy:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdgeDto"
        related:
          type: array
          items:
            $ref: "#/components/schemas/DependencyEdgeDto"

    DependencyEdgeDto:
      type: object
      required: [id, fromItemId, toItemId, type, createdAt]
      properties:
        id:
          type: string
          format: uuid
        fromItemId:
          type: string
          format: uuid
        toItemId:
          type: string
          format: uuid
        type:
          type: string
          enum: [blocks, is_blocked_by, relates_to]
        unblockAt:
          type: string
          nullable: true
          enum: [queue, work, review, terminal]
        createdAt:
          type: string
          format: date-time

    BacklinkDto:
      type: object
      required: [fromItemId, fromTitle, type]
      properties:
        fromItemId:
          type: string
          format: uuid
        fromTitle:
          type: string
        type:
          type: string
          enum: [blocks, is_blocked_by, relates_to]

    ErrorDto:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable description
        details:
          type: object
          nullable: true

    PageDto:
      type: object
      required: [items, page, pageSize, hasMore]
      properties:
        items:
          type: array
          items: {}
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
          format: int64
          nullable: true
          description: May be null when computing an exact count is expensive.
        hasMore:
          type: boolean
        skipped:
          type: integer
          nullable: true
          description: >
            Count of rows in this page's query window dropped for failing domain validation
            (e.g. a corrupt/legacy row). Omitted when nothing was skipped. The row is still
            counted in totalItems. Invariant: items.size == min(pageSize, totalItems - offset)
            - skipped (clamped to the actual window). Currently populated on GET /items and
            GET /items/roots.

    ItemCreateDto:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        parentId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
        complexity:
          type: integer
          nullable: true
        requiresVerification:
          type: boolean
          nullable: true
        tags:
          type: array
          items:
            type: string
          description: JSON array of tag strings (POST only — PATCH uses CSV string)
        statusLabel:
          type: string
          nullable: true
        properties:
          type: object
          nullable: true
        metadata:
          type: string
          nullable: true

    NoteWriteDto:
      type: object
      required: [role, body]
      properties:
        role:
          type: string
          enum: [queue, work, review]
        body:
          type: string
        properties:
          type: object
          nullable: true
          description: Reserved for future use; silently ignored in v1

    DependencyCreateDto:
      type: object
      required: [fromItemId, toItemId, type]
      properties:
        fromItemId:
          type: string
          format: uuid
        toItemId:
          type: string
          format: uuid
        type:
          type: string
          enum: [blocks, is_blocked_by, relates_to]
        unblockAt:
          type: string
          nullable: true
          description: Must be absent/null for relates_to edges

    AdvanceRequestDto:
      type: object
      required: [trigger]
      properties:
        trigger:
          type: string
          enum: [start, complete, block, hold, resume, cancel, reopen]

    MissingNoteDto:
      type: object
      required: [key, description]
      properties:
        key:
          type: string
        description:
          type: string
        guidance:
          type: string
          nullable: true
        skill:
          type: string
          nullable: true

    CascadeEventDto:
      type: object
      required: [itemId, title, previousRole, targetRole, applied]
      properties:
        itemId:
          type: string
          format: uuid
        title:
          type: string
        previousRole:
          type: string
        targetRole:
          type: string
        applied:
          type: boolean
        statusLabel:
          type: string
          nullable: true
        gateBlocked:
          type: boolean
          description: True when this cascade was suppressed by a required-note gate on the parent.
        missingNotes:
          type: array
          nullable: true
          description: Present only when gateBlocked is true.
          items:
            $ref: "#/components/schemas/MissingNoteDto"

    UnblockedItemDto:
      type: object
      required: [itemId, title]
      properties:
        itemId:
          type: string
          format: uuid
        title:
          type: string

    ExpectedNoteDto:
      type: object
      required: [key, role, required, description, exists]
      properties:
        key:
          type: string
        role:
          type: string
        required:
          type: boolean
        description:
          type: string
        guidance:
          type: string
          nullable: true
        skill:
          type: string
          nullable: true
        exists:
          type: boolean

    AdvanceResponseDto:
      type: object
      required: [itemId, previousRole, newRole, trigger]
      properties:
        itemId:
          type: string
          format: uuid
        previousRole:
          type: string
        newRole:
          type: string
        trigger:
          type: string
        statusLabel:
          type: string
          nullable: true
        cascadeEvents:
          type: array
          description: >-
            Cascade transitions applied (or gate-blocked) as a side effect of this advance —
            e.g. completing the last child auto-completing the parent. Mirrors the MCP
            advance_item cascadeEvents. Added when the REST and MCP advance paths were unified
            behind AdvanceService.
          items:
            $ref: "#/components/schemas/CascadeEventDto"
        unblockedItems:
          type: array
          description: Downstream items whose blocking dependencies are now satisfied.
          items:
            $ref: "#/components/schemas/UnblockedItemDto"
        expectedNotes:
          type: array
          description: Schema notes expected for the item's NEW role (parity with MCP advance_item).
          items:
            $ref: "#/components/schemas/ExpectedNoteDto"

    SearchHitDto:
      type: object
      required: [itemId, field, snippet, score]
      properties:
        itemId:
          type: string
          format: uuid
        field:
          type: string
        snippet:
          type: string
        score:
          type: number
          format: double
        noteKey:
          type: string
          nullable: true

    NoteSchemaEntryDto:
      type: object
      required: [key, role, required, description]
      properties:
        key:
          type: string
        role:
          type: string
          enum: [queue, work, review]
        required:
          type: boolean
        description:
          type: string
        guidance:
          type: string
          nullable: true
        skill:
          type: string
          nullable: true

    SchemaDto:
      type: object
      required: [type, lifecycleMode, hasReviewPhase, notes, defaultTraits]
      properties:
        type:
          type: string
        lifecycleMode:
          type: string
        hasReviewPhase:
          type: boolean
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteSchemaEntryDto"
        defaultTraits:
          type: array
          items:
            type: string

    TraitDto:
      type: object
      required: [name, notes]
      properties:
        name:
          type: string
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteSchemaEntryDto"

    ConfigSnapshotDto:
      type: object
      required: [schemas, traits, types, statusGraph]
      properties:
        schemas:
          type: array
          items:
            $ref: "#/components/schemas/SchemaDto"
        traits:
          type: array
          items:
            $ref: "#/components/schemas/TraitDto"
        types:
          type: array
          items:
            type: string
        statusGraph:
          $ref: "#/components/schemas/StatusGraphDto"
        defaultSchema:
          $ref: "#/components/schemas/SchemaDto"

    StatusGraphTypeDto:
      type: object
      required: [type, lifecycleMode, hasReviewPhase, transitions]
      properties:
        type:
          type: string
        lifecycleMode:
          type: string
        hasReviewPhase:
          type: boolean
        transitions:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: string
          description: |
            role -> trigger -> targetRole. Value "<previousRole>" is a sentinel string
            for blocked.resume — resolve from the live item's previousRole field.

    StatusGraphDto:
      type: object
      required: [roles, triggers, types]
      properties:
        roles:
          type: array
          items:
            type: string
        triggers:
          type: array
          items:
            type: string
        types:
          type: array
          items:
            $ref: "#/components/schemas/StatusGraphTypeDto"

    ServiceInfoDto:
      type: object
      required: [serverName, version, apiVersion, capabilities, claimModeAvailable,
                 actorAuthenticationEnabled]
      properties:
        serverName:
          type: string
        version:
          type: string
        apiVersion:
          type: string
        capabilities:
          type: array
          items:
            type: string
        claimModeAvailable:
          type: boolean
        actorAuthenticationEnabled:
          type: boolean

    HealthDto:
      type: object
      required: [status, dbReachable]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        dbReachable:
          type: boolean

    ProjectConfigResponseDto:
      type: object
      required: [rootItemId, fingerprint, updatedAt]
      properties:
        rootItemId:
          type: string
          format: uuid
        fingerprint:
          type: string
          description: SHA-256 hex digest of the stored configYaml's UTF-8 bytes
        updatedAt:
          type: string
          format: date-time
        configYaml:
          type: string
          nullable: true
          description: Raw stored YAML text; present on GET only (omitted on PUT)
        warning:
          type: string
          nullable: true
          description: Non-fatal notice when the root's `type` is not "project"

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDto"
    Forbidden:
      description: Authenticated but lacks required capability or scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDto"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDto"
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDto"
    InternalServerError:
      description: Database or server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDto"

paths:
  /items:
    get:
      summary: List work items
      operationId: listItems
      tags: [items]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: role
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
        - name: tag
          in: query
          schema:
            type: string
          description: Comma-separated tags; all must be present (AND)
        - name: tagAny
          in: query
          schema:
            type: string
          description: Comma-separated tags; any must be present (OR); overrides tag
        - name: type
          in: query
          schema:
            type: string
        - name: parentId
          in: query
          schema:
            type: string
            format: uuid
        - name: rootId
          in: query
          schema:
            type: string
            format: uuid
        - name: modifiedAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: modifiedBefore
          in: query
          schema:
            type: string
            format: date-time
        - name: createdAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: createdBefore
          in: query
          schema:
            type: string
            format: date-time
        - name: claimStatus
          in: query
          schema:
            type: string
            enum: [claimed, unclaimed, expired]
        - name: orderBy
          in: query
          schema:
            type: string
        - name: orderDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Paginated item list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PageDto"
                  - properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ItemDto"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Create a work item
      operationId: createItem
      tags: [items]
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemCreateDto"
      responses:
        "201":
          description: Item created
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /items/roots:
    get:
      summary: List root items (depth=0)
      description: >
        Scoped tokens return only the specific root items within scope (totalItems is the exact
        scoped root count). Unscoped/admin callers get standard page/pageSize pagination with
        totalItems from an exact COUNT query — no cap; page through all roots with repeated
        requests.
      operationId: listRootItems
      tags: [items]
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Root items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PageDto"
                  - properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ItemDto"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /items/{id}:
    get:
      summary: Get a single work item
      operationId: getItem
      tags: [items]
      parameters:
        - $ref: "#/components/parameters/itemId"
        - name: include
          in: query
          schema:
            type: string
          description: Comma-separated inclusions - notes, deps, children
        - name: If-None-Match
          in: header
          schema:
            type: string
      responses:
        "200":
          description: Item
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDto"
        "304":
          description: Not modified (If-None-Match matched)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      summary: JSON Merge Patch update
      operationId: patchItem
      tags: [items]
      parameters:
        - $ref: "#/components/parameters/itemId"
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
          description: Current ETag; required — missing -> 400 precondition_required
        - name: Idempotency-Key
          in: header
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              description: |
                RFC 7396 merge patch. tags must be a CSV string (not array).
                Server-owned fields id, role, previousRole, roleChangedAt, depth,
                createdAt, modifiedAt, version, claimedBy, claimedAt, claimExpiresAt,
                originalClaimedAt cannot be patched (400 field_not_patchable).
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Updated item
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          description: ETag mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"
        "415":
          description: Unsupported media type
          headers:
            Accept-Patch:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

    delete:
      summary: Cascade delete item
      operationId: deleteItem
      tags: [items]
      parameters:
        - $ref: "#/components/parameters/itemId"
        - name: If-Match
          in: header
          schema:
            type: string
          description: Optional conditional delete
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "412":
          description: ETag mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDto"

  /items/{id}/advance:
    post:
      summary: Trigger a role transition
      operationId: advanceItem
      tags: [items]
      description: |
        Runs the SAME advance pipeline as the MCP advance_item tool (resolve → validate →
        required-note gate → apply → cascade → unblock), unified behind AdvanceService.

        Bypasses MCP claim ownership — a claimed item advances successfully regardless of
        which MCP agent holds the claim. Response does NOT include claimedBy. WARN is logged
        when API_WARN_ON_CLAIMED_ADVANCE=true (default).

        Required-note gates ARE enforced: a start/complete that leaves a required note unfilled
        is rejected with 422 (error code "gate_blocked") and the missing notes in details.missingNotes,
        rather than silently advancing. The response includes cascadeEvents, unblockedItems, and
        expectedNotes (additive — older clients can ignore the new fields).
      parameters:
        - $ref: "#/components/parameters/itemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvanceRequestDto"
      responses:
        "200":
          description: Transition applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvanceResponseDto"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
