  /events:
    get:
      summary: Server-Sent Events stream
      operationId: getEvents
      tags: [events]
      description: |
        Real-time SSE stream. Auth runs in a pre-flight plugin phase (before the SSE handler
        commits the 200 response). Requires read or admin capability.

        Browser clients cannot use native EventSource because it does not support custom headers.
        Use a fetch-based SSE library (e.g. @microsoft/fetch-event-source) with
        Authorization: Bearer, or enable API_ALLOW_QUERY_TOKEN_FOR_SSE=true for ?token= access.

        KNOWN LIMITATION: Last-Event-ID replay is unfiltered by root — buffered events may
        include metadata from outside the requested ?root= scope. See api-rest.md §22.

        Event ID namespace is independent from /mcp SSE channel. Do NOT reuse Last-Event-ID
        values across the two channels.
      parameters:
        - name: root
          in: query
          schema:
            type: string
            format: uuid
          description: Root-subtree filter (repeatable); intersected with principal scope
        - name: types
          in: query
          schema:
            type: string
          description: Comma-separated event type filter
        - name: token
          in: query
          schema:
            type: string
          description: Bearer token (only accepted when API_ALLOW_QUERY_TOKEN_FOR_SSE=true)
        - name: Last-Event-ID
          in: header
          schema:
            type: string
          description: Resume from this event ID; replay unfiltered by root (known limitation)
      responses:
        "200":
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Each event: id:<n>\nevent:<type>\ndata:<ApiEvent JSON>\n\n
                  Event types: item.created, item.updated, item.deleted, item.advanced,
                  note.upserted, note.deleted, dependency.added, dependency.removed,
                  scope.entered, scope.left, sync.lost, auth.expired
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
